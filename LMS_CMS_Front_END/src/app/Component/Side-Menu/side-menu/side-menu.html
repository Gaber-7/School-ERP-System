<div [ngClass]="isCollapsed ? 'w-24' : 'w-80'"
    class="flex flex-col h-screen p-3 bg-white shadow-xl border-r border-gray-200 transition-all duration-300 ease-in-out">

    <div class="space-y-4">
        <div class="flex items-center p-2 min-h-[48px] rounded-xl"
            [ngClass]="isCollapsed ? 'justify-center' : 'justify-start gap-3 bg-gray-50/50 px-3'">

            <button (click)="toggleSidebar()"
                class="p-1.5 rounded-lg bg-white hover:bg-gray-100 text-gray-500 hover:text-indigo-600 shadow-sm border border-gray-100 focus:outline-none transition-all duration-200 shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5"
                    stroke="currentColor" class="w-5 h-5 transform transition-transform duration-300"
                    [ngClass]="isCollapsed ? 'rotate-0' : 'rotate-180'">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
                </svg>
            </button>

            <h2 *ngIf="!isCollapsed"
                class="text-xl font-bold text-gray-800 select-none transition-all duration-200 overflow-hidden text-ellipsis whitespace-nowrap">
                DashBoard Main
            </h2>
        </div>

        <div *ngIf="!isCollapsed" class="relative transition-all duration-200 px-1">
            <span class="absolute inset-y-0 right-3 flex items-center pr-1">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="w-5 h-5 text-gray-400">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.602 10.602Z" />
                </svg>
            </span>
            <input type="search"
                class="w-full py-2 pr-10 pl-3 text-lg bg-gray-100 rounded-lg focus:outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500 transition-all"
                placeholder="search....">
        </div>

        <div class="flex-1">
            <ul class="space-y-1.5 text-xl font-bold">
                <li *ngFor="let item of menuItems"
                    [ngClass]="item.active ? 'bg-indigo-50 text-indigo-700' : 'text-gray-600 hover:bg-gray-50 hover:text-indigo-600'"
                    class="rounded-xl transition-colors duration-200 cursor-pointer"
                    [title]="isCollapsed ? item.label : ''">

                    <a class="flex items-center p-3 font-semibold w-full"
                        [ngClass]="isCollapsed ? 'justify-center' : 'justify-start'">

                        <span class="w-8 h-8 flex items-center justify-center shrink-0"
                            [ngClass]="isCollapsed ? 'ml-0' : 'ml-4'">
                            <ng-container [ngSwitch]="item.icon">

                                <svg *ngSwitchCase="'dashboard'" xmlns="http://www.w3.org/2000/svg" fill="none"
                                    viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M7.5 14.25v2.25m3-4.5v4.5m3-6.75v6.75m3-9v9M6 20.25h12A2.25 2.25 0 0 0 20.25 18V6A2.25 2.25 0 0 0 18 3.75H6A2.25 2.25 0 0 0 3.75 6v12A2.25 2.25 0 0 0 6 20.25Z" />
                                </svg>

                                <svg *ngSwitchCase="'Administration'" xmlns="http://www.w3.org/2000/svg" fill="none"
                                    viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M15 9h3.75M15 12h3.75M15 15h3.75M4.5 19.5h15a2.25 2.25 0 0 0 2.25-2.25V6.75A2.25 2.25 0 0 0 19.5 4.5h-15A2.25 2.25 0 0 0 2.25 6.75v10.5A2.25 2.25 0 0 0 4.5 19.5Zm6-10.125a1.875 1.875 0 1 1-3.75 0 1.875 1.875 0 0 1 3.75 0Zm1.294 6.336a6.721 6.721 0 0 1-3.17.789 6.721 6.721 0 0 1-3.168-.789 3.376 3.376 0 0 1 2.505-2.185 1.875 1.875 0 0 0 1.325 0 3.376 3.376 0 0 1 2.508 2.185Z" />
                                </svg>

                                <svg *ngSwitchCase="'Management System'" xmlns="http://www.w3.org/2000/svg" fill="none"
                                    viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 16.5h1.5m3 0H15" />
                                </svg>

                                <svg *ngSwitchCase="'Registration'" xmlns="http://www.w3.org/2000/svg" fill="none"
                                    viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M11.35 3.836c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75 2.25 2.25 0 0 0-.1-.664m-5.8 0A2.251 2.251 0 0 1 13.5 2.25H15c1.03 0 1.9.693 2.166 1.636m-5.8 0A2.25 2.25 0 0 0 10.5 5.25v13.5A2.25 2.25 0 0 0 12.75 21h4.5A2.25 2.25 0 0 0 19.5 18.75V5.25a2.25 2.25 0 0 0-2.134-2.236M6.75 7.5H3m3.75 3.75H3m3.75 3.75H3m3.75 3.75H3" />
                                </svg>

                                <svg *ngSwitchCase="'folder'" xmlns="http://www.w3.org/2000/svg" fill="none"
                                    viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M2.25 12.75V12A2.25 2.25 0 0 1 4.5 9.75h1.52c.314 0 .611-.124.833-.346l1.353-1.353a2.25 2.25 0 0 1 1.59-1.658h5.214A2.25 2.25 0 0 1 18.75 8.25v.382m-16.5 4.118A2.25 2.25 0 0 0 2.25 15v3a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18v-3a2.25 2.25 0 0 0-2.25-2.25m-16.5 0V12m16.5 4.118v-4.118m0 0A2.25 2.25 0 0 0 19.5 9.75h-1.52c-.314 0-.611-.124-.833-.346l-1.353-1.353a2.25 2.25 0 0 0-1.59-.658H9.75" />
                                </svg>

                                <svg *ngSwitchCase="'check_circle'" xmlns="http://www.w3.org/2000/svg" fill="none"
                                    viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                                </svg>

                                <svg *ngSwitchCase="'settings'" xmlns="http://www.w3.org/2000/svg" fill="none"
                                    viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.43l-1.003.767c-.29.223-.443.59-.411.956.004.053.006.107.006.162a.733.733 0 0 1-.006.163c-.032.366.12.733.411.956l1.003.767a1.125 1.125 0 0 1 .26 1.43l-1.296 2.247a1.125 1.125 0 0 1-1.37.49l-1.216-.456c-.356-.133-.751-.072-1.076.124a6.57 6.57 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.43l1.004-.767c.29-.223.443-.59.411-.956a6.46 6.46 0 0 1-.006-.163c0-.055.002-.11.006-.162.032-.366-.12-.733-.411-.956l-1.004-.767a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.49l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" />
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                                </svg>

                            </ng-container>
                        </span>

                        <span *ngIf="!isCollapsed" class="text-xl font-bold select-none transition-all duration-200">{{
                            item.label }}</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</div>
