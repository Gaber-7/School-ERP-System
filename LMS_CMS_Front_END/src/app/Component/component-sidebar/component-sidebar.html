<div [ngClass]="isCollapsed ? 'w-24' : 'w-80'"
    class="flex flex-col h-screen p-3 bg-white shadow-xl border-r border-gray-200 transition-all duration-300">

    <!-- Header -->
    <div class="flex items-center gap-3 p-2 rounded-xl bg-gray-50">

        <button (click)="toggleSidebar()" class="p-2 rounded-lg hover:bg-gray-200 transition-all shrink-0">

            <i class="fa-solid fa-bars"></i>

        </button>

        <h2 *ngIf="!isCollapsed" class="text-xl font-bold text-gray-700 truncate">

            Lookscout Dashboard

        </h2>

    </div>

    <!-- MENU SAFE RENDER -->
    <ng-container *ngIf="menuItems.length > 0; else loading">

        <ul class="mt-5 space-y-2">

            <ng-container *ngFor="let item of menuItems">

                <li>

                    <div class="flex items-center justify-between p-3 rounded-xl text-xl text-gray-700 cursor-pointer hover:bg-indigo-50 transition-all duration-200"
                        (click)="toggleMenu(item)">

                        <div class="flex items-center gap-3">

                            <i [class]="item.icon"></i>

                            <span *ngIf="!isCollapsed" class="font-semibold">

                                {{ item.en_name }}

                            </span>

                        </div>

                        <i *ngIf="item.children.length > 0 && !isCollapsed" class="fa-solid"
                            [ngClass]="item.isExpanded ? 'fa-chevron-down' : 'fa-chevron-right'">
                        </i>

                    </div>

                    <!-- Children -->
                    <div *ngIf="item.isExpanded && !isCollapsed" class="ml-8 mt-2 space-y-2">

                        <ng-container *ngTemplateOutlet="recursiveMenu;
                            context:{ $implicit: item.children }">
                        </ng-container>

                    </div>

                </li>

            </ng-container>

        </ul>

    </ng-container>

    <!-- Loading fallback -->
    <ng-template #loading>

        <div class="text-gray-400 p-4">
            Loading menu...
        </div>

    </ng-template>

</div>

<!-- Recursive -->
<ng-template #recursiveMenu let-children>

    <div *ngFor="let child of children">

        <a [routerLink]="child.route"
            class="flex items-center justify-between text-lg text-gray-700 p-2 rounded-lg hover:bg-gray-100 transition-all">

            <div class="flex items-center gap-2">

                <i [class]="child.icon"></i>

                <span>{{ child.en_name }}</span>

            </div>

        </a>

    </div>

</ng-template>
