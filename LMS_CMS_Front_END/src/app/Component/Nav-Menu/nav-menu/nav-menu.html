<nav class="bg-white shadow-lg border-b border-gray-200">
  <div class="max-w-7xl mx-auto px-4">
    <div class="flex justify-between h-16 items-center">
      
      <!-- شعار الموقع -->
      <!-- <div class="flex-shrink-0 flex items-center">
        <span class="text-2xl font-bold text-indigo-600">شعارك</span>
      </div> -->

      <!-- الروابط للشاشات الكبيرة -->
      <div class="hidden md:flex space-x-8 space-x-reverse">
        <a *ngFor="let item of navItems" 
           [href]="item.link" 
           class="text-gray-700 hover:text-indigo-600 px-3 py-2 font-medium transition duration-150">
          {{ item.label }}
        </a>
      </div>

      <!-- زر القائمة للجوال -->
      <div class="md:hidden flex items-center">
        <button (click)="toggleMenu()" class="text-gray-600 hover:text-indigo-600 focus:outline-none">
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path *ngIf="!isMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
            <path *ngIf="isMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- القائمة المنسدلة للجوال -->
  <div [class.hidden]="!isMenuOpen" class="md:hidden bg-gray-50 border-t border-gray-200">
    <div class="px-2 pt-2 pb-3 space-y-1">
      <a *ngFor="let item of navItems" 
         [href]="item.link" 
         class="block px-3 py-2 text-base font-medium text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 rounded-md">
        {{ item.label }}
      </a>
    </div>
  </div>
</nav>
